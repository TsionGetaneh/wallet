<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Crypto Wallet</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .container {
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 30px;
            backdrop-filter: blur(10px);
        }
        input, button {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: none;
            border-radius: 10px;
            font-size: 16px;
        }
        button {
            background: #4CAF50;
            color: white;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover {
            transform: scale(1.02);
            background: #45a049;
        }
        input {
            background: rgba(255,255,255,0.9);
        }
        .balance {
            font-size: 32px;
            text-align: center;
            margin: 20px 0;
            padding: 20px;
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
        }
        h1 {
            text-align: center;
        }
        .status {
            text-align: center;
            padding: 10px;
            border-radius: 10px;
            margin-top: 20px;
        }
        .connected {
            background: #4CAF50;
        }
        .disconnected {
            background: #f44336;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💰 My Blockchain Wallet</h1>
        
        <!-- Connection Section -->
        <button id="connectBtn" onclick="connectWallet()">🔌 Connect MetaMask</button>
        <div id="accountInfo" style="text-align:center; margin:10px;"></div>
        
        <!-- Contract Address Input (pre-filled) -->
        <input type="text" id="contractAddress" placeholder="Enter Contract Address" value="0x2460A60260ade583061590DF270b75Ffa80D4261">
        
        <!-- Balance Section -->
        <div class="balance" id="balance">Balance: 0 ETH</div>
        <button onclick="getBalance()">🔄 Refresh Balance</button>
        
        <!-- Deposit Section -->
        <h3>📥 Deposit ETH</h3>
        <input type="number" id="depositAmount" placeholder="Amount in ETH">
        <button onclick="deposit()">Deposit</button>
        
        <!-- Send Section -->
        <h3>📤 Send ETH (Owner Only)</h3>
        <input type="text" id="sendTo" placeholder="Recipient Address">
        <input type="number" id="sendAmount" placeholder="Amount in ETH">
        <button onclick="sendMoney()">Send</button>
        
        <!-- Status Message -->
        <div id="status" class="status disconnected">⚠️ Not Connected</div>
        <div id="remainingAmount" style="text-align:center; margin:10px;"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/web3@1.10.0/dist/web3.min.js"></script>
    <script>
        let web3;
        let contract;
        let account;
        let initialBalance = 0; // Store initial balance

        // YOUR CONTRACT ABI (copied from Remix)
        const contractABI = [
            {
                "inputs": [],
                "stateMutability": "nonpayable",
                "type": "constructor"
            },
            {
                "inputs": [],
                "name": "getBalance",
                "outputs": [
                    {
                        "internalType": "uint256",
                        "name": "",
                        "type": "uint256"
                    }
                ],
                "stateMutability": "view",
                "type": "function"
            },
            {
                "inputs": [],
                "name": "owner",
                "outputs": [
                    {
                        "internalType": "address",
                        "name": "",
                        "type": "address"
                    }
                ],
                "stateMutability": "view",
                "type": "function"
            },
            {
                "inputs": [
                    {
                        "internalType": "address payable",
                        "name": "to",
                        "type": "address"
                    },
                    {
                        "internalType": "uint256",
                        "name": "amount",
                        "type": "uint256"
                    }
                ],
                "name": "sendMoney",
                "outputs": [],
                "stateMutability": "nonpayable",
                "type": "function"
            },
            {
                "stateMutability": "payable",
                "type": "receive"
            }
        ];
        
        async function connectWallet() {
            if (window.ethereum) {
                try {
                    // Connect MetaMask
                    web3 = new Web3(window.ethereum);
                    await window.ethereum.request({ method: 'eth_requestAccounts' });
                    const accounts = await web3.eth.getAccounts();
                    account = accounts[0];
                    
                    // Get contract address from input
                    const contractAddress = document.getElementById('contractAddress').value;
                    if (!contractAddress) {
                        document.getElementById('status').innerHTML = '❌ Please enter contract address';
                        document.getElementById('status').className = 'status disconnected';
                        return;
                    }
                    
                    // Create contract instance
                    contract = new web3.eth.Contract(contractABI, contractAddress);
                    
                    // Update UI
                    document.getElementById('accountInfo').innerHTML = `✅ Connected: ${account.substring(0,6)}...${account.substring(38)}`;
                    document.getElementById('status').innerHTML = '✅ Connected to Contract!';
                    document.getElementById('status').className = 'status connected';
                    
                    // Get initial balance
                    await getBalance();
                    
                } catch (error) {
                    console.error(error);
                    document.getElementById('status').innerHTML = '❌ Connection failed: ' + error.message;
                }
            } else {
                alert('Please install MetaMask!');
                window.open('https://metamask.io/download.html', '_blank');
            }
        }
        
        async function getBalance() {
            if (!contract) {
                alert('Please connect first!');
                return;
            }
            
            try {
                const balanceWei = await contract.methods.getBalance().call();
                const balanceEth = web3.utils.fromWei(balanceWei, 'ether');
                document.getElementById('balance').innerHTML = `💰 Balance: ${balanceEth} ETH`;
                initialBalance = parseFloat(balanceEth); // Store initial balance for calculations
            } catch (error) {
                console.error(error);
                document.getElementById('status').innerHTML = '❌ Error getting balance';
            }
        }
        
        async function deposit() {
            if (!contract || !account) {
                alert('Please connect first!');
                return;
            }
            
            const amount = document.getElementById('depositAmount').value;
            if (!amount || amount <= 0) {
                alert('Please enter a valid amount');
                return;
            }
            
            try {
                document.getElementById('status').innerHTML = '⏳ Processing deposit...';
                
                // Send ETH directly to the contract address (triggers receive())
                const weiAmount = web3.utils.toWei(amount, 'ether');
                await web3.eth.sendTransaction({
                    from: account,
                    to: contract.options.address,
                    value: weiAmount
                });
                
                document.getElementById('status').innerHTML = `✅ Deposited ${amount} ETH!`;
                await getBalance();
                document.getElementById('remainingAmount').innerHTML = `Remaining Amount: ${initialBalance + parseFloat(amount)} ETH`; // Update remaining amount
                document.getElementById('depositAmount').value = '';
                
            } catch (error) {
                console.error(error);
                document.getElementById('status').innerHTML = '❌ Deposit failed: ' + error.message;
            }
        }
        
        async function sendMoney() {
            if (!contract || !account) {
                alert('Please connect first!');
                return;
            }
            
            const to = document.getElementById('sendTo').value;
            const amount = document.getElementById('sendAmount').value;
            
            if (!to || !amount || amount <= 0) {
                alert('Please enter valid recipient and amount');
                return;
            }
            
            try {
                document.getElementById('status').innerHTML = '⏳ Sending...';
                
                await contract.methods.sendMoney(to, web3.utils.toWei(amount, 'ether'))
                    .send({ from: account });
                
                document.getElementById('status').innerHTML = `✅ Sent ${amount} ETH to ${to.substring(0,6)}...`;
                await getBalance();
                document.getElementById('remainingAmount').innerHTML = `Remaining Amount: ${initialBalance - parseFloat(amount)} ETH`; // Update remaining amount
                document.getElementById('sendTo').value = '';
                document.getElementById('sendAmount').value = '';
                
            } catch (error) {
                console.error(error);
                document.getElementById('status').innerHTML = '❌ Send failed: ' + error.message;
            }
        }
        
        // Auto-detect account changes
        if (window.ethereum) {
            window.ethereum.on('accountsChanged', function(accounts) {
                if (accounts.length > 0) {
                    account = accounts[0];
                    document.getElementById('accountInfo').innerHTML = `🔄 Account changed: ${account.substring(0,6)}...`;
                    getBalance();
                } else {
                    // No account connected
                    account = null;
                    document.getElementById('accountInfo').innerHTML = '❌ No account connected';
                    document.getElementById('status').innerHTML = '⚠️ Disconnected';
                    document.getElementById('status').className = 'status disconnected';
                }
            });
        }

        // Refresh balance on load
        window.onload = async () => {
            if (contract) {
                await getBalance();
            }
        }
    </script>
</body>
</html>
